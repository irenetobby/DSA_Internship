<!DOCTYPE html>
<html>
<head>
    <title>Book Success Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Book Success Predictor</h2>
        <form action="/predict" method="POST">
            <input type="text" name="Language" placeholder="Language (e.g., Malayalam)" required>
            <input type="text" name="Genre" placeholder="Genre (e.g., Fiction)" required>
            <input type="number" name="Price" placeholder="Price (INR)" required>
            <input type="number" name="Pages" placeholder="Pages" required>
            <input type="text" name="Format" placeholder="Format (e.g., Paperback)" required>
            <button type="submit">Predict Success</button>
        </form>

        {% if prediction %}
            <div class="result-box">
                <p><strong>Predicted Success:</strong> {{ prediction }}</p>
                <p><strong>GenAI Suggestion:</strong> {{ strategy }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
